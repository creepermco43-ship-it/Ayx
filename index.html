<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crew Gaming | Official Staff Application</title>
    <style>
        /* Ultra-Premium Ice & Fire Glassmorphism Theme (Purple + Blue + White Mixture) */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Syncopate:wght@700&display=swap');
        
        :root {
            --bg-space: #05070e; /* Near-black space */
            --nebula-core: #ffffff; /* Pure white central wash */
            --primary-blue: #0077ff; /* Rich standard blue */
            --neon-cyan: #00f3ff; /* Bright blue for accents */
            --primary-purple: #9d4edd; /* Deep professional purple */
            --pure-white: #ffffff; /* Pure accents and form text */
            --text-main: #f8f9fa; /* Main off-white text */
            --glass-base: rgba(255, 255, 255, 0.04); /* Clearer frosting */
            --glass-border: rgba(255, 255, 255, 0.15); /* White accent border */
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            /* Background is a complex mixture of all 3 colors */
            background: 
                radial-gradient(circle at center, rgba(255, 255, 255, 0.08) 0%, rgba(157, 78, 221, 0.1) 40%, rgba(0, 119, 255, 0.15) 70%, rgba(5, 7, 14, 0.95) 100%),
                linear-gradient(135deg, rgba(5, 7, 14, 1) 0%, rgba(15, 20, 30, 1) 100%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Subtle Clean Grid (Lag-free) */
        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            animation: panGrid 25s linear infinite;
        }
        @keyframes panGrid {
            0% { transform: translateY(0); }
            100% { transform: translateY(40px); }
        }

        /* Header containing the user's image */
        .header {
            text-align: center;
            padding: 60px 20px 20px;
            animation: fadeInDown 0.8s ease-out;
            position: relative;
        }

        /* Styling for image_1.png */
        .header-banner {
            max-width: 180px; /* Adjust size as needed */
            height: auto;
            border-radius: 50%; /* Make it a cool circle */
            border: 4px solid var(--pure-white);
            box-shadow: 
                0 0 25px rgba(255, 255, 255, 0.5), /* Pure white base glow */
                0 0 50px rgba(0, 119, 255, 0.4),  /* Blue aura */
                0 0 75px rgba(157, 78, 221, 0.4); /* Purple aura */
            transition: all 0.4s;
            animation: bannerPulse 3s infinite alternate cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 25px;
        }
        .header-banner:hover {
            transform: scale(1.05) rotate(2deg);
            box-shadow: 
                0 0 35px var(--pure-white),
                0 0 60px var(--neon-cyan),
                0 0 90px #b026ff; /* Deeper purple on hover */
        }
        @keyframes bannerPulse {
            0% { box-shadow: 0 0 25px rgba(255,255,255,0.3), 0 0 50px rgba(0,119,255,0.2), 0 0 75px rgba(157,78,221,0.2); transform: scale(1); }
            100% { box-shadow: 0 0 40px rgba(255,255,255,0.6), 0 0 70px rgba(0,243,255,0.5), 0 0 110px rgba(176,38,255,0.5); transform: scale(1.02); }
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 3.2rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 5px; margin: 0;
            color: var(--pure-white);
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.5), 0 0 10px rgba(0,0,0,0.5);
        }
        .subtitle {
            font-size: 1.3rem; color: #a0aec0;
            margin-top: 10px; letter-spacing: 3px; text-transform: uppercase;
            font-weight: 600;
        }

        /* Frosted Glass Container with Multi-Color Glow */
        .container {
            max-width: 800px; margin: 0 auto 60px auto;
            background: var(--glass-base);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 45px;
            /* Blue glow on left/bottom, Purple glow on right/top */
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.6), 
                inset 0 0 0 1px rgba(255,255,255,0.1),
                inset 10px -10px 40px rgba(0, 119, 255, 0.1), /* Inner Blue wash */
                inset -10px 10px 40px rgba(157, 78, 221, 0.1), /* Inner Purple wash */
                -5px 5px 25px rgba(0, 119, 255, 0.2), /* Outer Blue wash */
                5px -5px 25px rgba(157, 78, 221, 0.2); /* Outer Purple wash */
            animation: slideUp 0.8s ease-out;
        }

        /* Section Headers with Gradient underlines and Blue Label text */
        .section-title {
            font-size: 1.4rem; color: var(--pure-white);
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 12px; margin: 40px 0 30px 0;
            text-transform: uppercase; letter-spacing: 2px;
            position: relative; display: inline-block;
            font-weight: 800;
        }
        .section-title::after {
            content: ''; position: absolute; bottom: -2px; left: 0;
            width: 50%; height: 2px; 
            background: linear-gradient(90deg, var(--neon-cyan), var(--primary-purple));
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.6);
        }
        .section-title:first-child { margin-top: 0; }

        /* Form Groups and Inputs */
        .form-group { margin-bottom: 25px; }
        
        label {
            display: block; font-size: 1rem; margin-bottom: 8px;
            color: #cbd5e1; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s;
        }
        .form-group:hover label { color: var(--neon-cyan); }

        /* Clean White Input styling with subtle focus border */
        input[type="text"], input[type="number"], input[type="email"], textarea, select {
            width: 100%; padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; color: var(--pure-white);
            font-size: 1.05rem; font-family: 'Inter', sans-serif;
            box-sizing: border-box; transition: all 0.3s ease;
        }
        input:focus, textarea:focus, select:focus {
            outline: none; background: rgba(255, 255, 255, 0.07);
            border-color: var(--pure-white);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3), 0 0 10px rgba(0, 119, 255, 0.3);
            transform: translateY(-2px);
        }
        textarea { resize: vertical; min-height: 100px; }

        /* Radio Buttons */
        .radio-group { display: flex; gap: 20px; }
        .radio-group label {
            display: flex; align-items: center; cursor: pointer;
            color: #cbd5e1; font-weight: 600; padding: 14px 28px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px; transition: 0.3s; text-transform: none;
        }
        .radio-group input[type="radio"] { display: none; }
        .radio-group input[type="radio"]:checked + label {
            background: rgba(255,255,255,0.15); border-color: var(--pure-white);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4); color: var(--pure-white);
            font-weight: bold;
        }

        /* White Submit Button with Massive Pulse Effect on Hover */
        .submit-btn {
            width: 100%; padding: 22px; margin-top: 40px;
            background: var(--pure-white); color: var(--bg-space);
            border: none; border-radius: 12px;
            font-size: 1.3rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 4px;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2);
            font-family: 'Inter', sans-serif;
        }
        .submit-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 45px var(--pure-white), 0 0 70px var(--primary-blue);
            background: #e6e6e6;
        }

        /* SUCCESS FULL-SCREEN CINEMATIC ANIMATION */
        .success-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 7, 14, 0.97); backdrop-filter: blur(15px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; opacity: 0; visibility: hidden; transition: 0.6s ease-in-out;
        }
        .success-overlay.active { opacity: 1; visibility: visible; }
        
        .check-circle {
            width: 120px; height: 120px; border-radius: 50%;
            background: var(--pure-white); color: var(--bg-space);
            display: flex; justify-content: center; align-items: center;
            font-size: 60px; font-weight: bold;
            transform: scale(0); transition: 0.7s 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Multi-Color pulse */
            box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7), 0 0 0 0 rgba(0,119,255,0.3), 0 0 0 0 rgba(157,78,221,0.3);
            animation: pulse-multi 2.5s infinite;
        }
        .success-overlay.active .check-circle { transform: scale(1); }
        
        .success-text {
            color: var(--pure-white); font-size: 3rem; font-weight: 800;
            margin-top: 35px; text-transform: uppercase; letter-spacing: 6px;
            text-shadow: 0 0 25px rgba(255,255,255,0.6);
            font-family: 'Syncopate', sans-serif;
            opacity: 0; transform: translateY(30px); transition: 0.6s 0.4s ease-out;
        }
        .success-overlay.active .success-text { opacity: 1; transform: translateY(0); }
        
        .success-sub {
            color: #a0aec0; font-size: 1.2rem; margin-top: 15px; letter-spacing: 1.5px;
            opacity: 0; transition: 0.6s 0.6s ease;
            font-weight: 600;
        }
        .success-overlay.active .success-sub { opacity: 1; }

        @keyframes pulse-multi {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7), 0 0 0 0 rgba(0,119,255,0.3), 0 0 0 0 rgba(157,78,221,0.3); }
            50% { box-shadow: 0 0 0 35px rgba(255, 255, 255, 0), 0 0 0 60px rgba(0,119,255,0), 0 0 0 90px rgba(157,78,221,0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0), 0 0 0 0 rgba(0,119,255,0), 0 0 0 0 rgba(157,78,221,0); }
        }

        /* Entry Animations */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        /* Make image visible for this generation context */
        img[alt="Generated Banner"] { display: block !important; }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="success-overlay" id="successScreen">
        <div class="check-circle">✓</div>
        <div class="success-text">Application Sent</div>
        <div class="success-sub">Review Process Initiated • Crew Gaming Admin System</div>
    </div>

    <div class="header">
        <img src="image_1.png" alt="Generated Banner" class="header-banner">
        <h1>Crew Gaming</h1>
        <div class="subtitle">Elite Staff Application</div>
    </div>

    <div class="container">
        <form id="crewForm">
            
            <div class="section-title">1️⃣ Personal Information</div>
            
            <div class="form-group">
                <label>Discord Username:</label>
                <input type="text" id="discord" placeholder="e.g. username#1234 or @username" required>
            </div>
            <div class="form-group">
                <label>Email Address:</label>
                <input type="email" id="email" placeholder="your.email@gmail.com" required>
            </div>
            <div class="form-group">
                <label>Age:</label>
                <input type="number" id="age" placeholder="Your current age" required min="13" max="99">
            </div>
            <div class="form-group">
                <label>Timezone:</label>
                <input type="text" id="timezone" placeholder="e.g. IST, EST, GMT" required>
            </div>

            <div class="section-title">2️⃣ Experience & Qualifications</div>
            
            <div class="form-group">
                <label>Role Applied For:</label>
                <select id="role" required>
                    <option value="" disabled selected>Select a role...</option>
                    <option value="Staff">Staff</option>
                    <option value="Moderator">Moderator</option>
                    <option value="Senior Moderator">Senior Moderator</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>
            <div class="form-group">
                <label>Previous Moderation Experience:</label>
                <textarea id="prevExp" placeholder="List servers, roles, and durations (or type 'None')" required></textarea>
            </div>
            <div class="form-group">
                <label>Familiarity with Discord Bots:</label>
                <textarea id="bots" placeholder="Which bots do you know? (Dyno, Carl-bot, etc.)" required></textarea>
            </div>

            <div class="section-title">3️⃣ Motivation & Availability</div>

            <div class="form-group">
                <label>Why do you want to join the Crew Gaming staff team?</label>
                <textarea id="whyJoin" required></textarea>
            </div>
            <div class="form-group">
                <label>How many hours can you dedicate daily?</label>
                <input type="text" id="hours" placeholder="e.g. 3-4 hours" required>
            </div>
            <div class="form-group">
                <label>What unique skills can you bring?</label>
                <textarea id="skills" required></textarea>
            </div>

            <div class="section-title">4️⃣ Scenario Scenarios</div>

            <div class="form-group">
                <label>How would you handle two members actively arguing in public?</label>
                <textarea id="scenario1" required></textarea>
            </div>
            <div class="form-group">
                <label>If a user disrespects you while issuing a warning, how do you respond?</label>
                <textarea id="scenario2" required></textarea>
            </div>
            <div class="form-group">
                <label>What immediate action do you take if the server gets raided?</label>
                <textarea id="scenario3" required></textarea>
            </div>

            <div class="section-title">✅ Agreement</div>

            <div class="form-group">
                <label>Do you agree to follow guidelines and maintain professionalism?</label>
                <div class="radio-group">
                    <input type="radio" id="agreeYes" name="agreement" value="Yes" required>
                    <label for="agreeYes">Yes, I agree</label>
                    <input type="radio" id="agreeNo" name="agreement" value="No">
                    <label for="agreeNo">No, I do not</label>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Submit Application</button>
        </form>
    </div>

    <script>
        document.getElementById('crewForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Webhook Link
            const webhookUrl = 'https://discord.com/api/webhooks/1479517646612467756/tatPjfezS5J8etm5WrktxdgMhvLAXlAoP5mbTkvjjDXL10_-vHbJr3Uuw9YRWfDUFGGH';
            
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Processing...";
            btn.style.opacity = "0.7";
            btn.disabled = true;

            const discordUser = document.getElementById('discord').value;
            const roleApplied = document.getElementById('role').value;
            const emailValue = document.getElementById('email').value;

            // Properly Numbered Array format for Discord Embed
            const payload = {
                // Keep the ping as requested, change to role ID "<@&baby.exe>" for real tag
                content: "🚨 New Application Alert! Ping: <@&baby.exe>", 
                embeds: [{
                    title: "📋 " + roleApplied + " Application",
                    description: "**Applicant:** `" + discordUser + "`",
                    color: 3447003, // Blue Theme Color
                    fields: [
                        { name: "👤 Person Info", value: `**Age:** ${document.getElementById('age').value}\n**Timezone:** ${document.getElementById('timezone').value}\n**Email:** ${emailValue}`, inline: false },
                        { name: "🛠️ Previous Experience", value: document.getElementById('prevExp').value, inline: false },
                        { name: "🤖 Bot Knowledge", value: document.getElementById('bots').value, inline: false },
                        { name: "⏱️ Motivation (Why Join?)", value: document.getElementById('whyJoin').value, inline: false },
                        { name: "🕒 Daily Active Hours", value: document.getElementById('hours').value, inline: false },
                        { name: "🔥 Unique Skills", value: document.getElementById('skills').value, inline: false },
                        { name: "⚔️ Scenario: Arguing Members", value: document.getElementById('scenario1').value, inline: false },
                        { name: "🛡️ Scenario: Disrespectful User", value: document.getElementById('scenario2').value, inline: false },
                        { name: "🌪️ Scenario: Server Raid", value: document.getElementById('scenario3').value, inline: false },
                        { name: "✅ Agreed to Guidelines?", value: document.querySelector('input[name="agreement"]:checked').value, inline: false }
                    ],
                    thumbnail: {
                        url: "https://cdn-icons-png.flaticon.com/512/5968/5968756.png"
                    },
                    footer: { text: "Crew Gaming • Staff Application System" },
                    timestamp: new Date().toISOString()
                }]
            };

            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                // SUCCESS ANIMATION TRIGGER
                const overlay = document.getElementById('successScreen');
                overlay.classList.add('active'); // Screen pe animation show karega
                
                // Form clear karo
                document.getElementById('crewForm').reset();
                window.scrollTo({ top: 0, behavior: 'smooth' });

                // 4.5 seconds baad animation hide kar dega wapas home page pe laane ke liye
                setTimeout(() => {
                    overlay.classList.remove('active');
                }, 4500);
            })
            .catch(error => {
                alert("❌ Something went wrong. Please check your connection.");
                console.error(error);
            })
